<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cookie Consent</title>
        <link rel="stylesheet" href="stylesheet.css">
        <script src="main.js" defer></script>
    </head>    
    <body>
        <section class="settings">
            <section class="header">
                <button class="active-tab" id="button1">First Tab</button>
                <button class="active-tab" id="button2">Second Tab</button>
                <button class="active-tab" id="button3">Third Tab</button>
                <button class="active-tab" id="button4">Forth Tab</button>
            </section>
            <section class="textBox">
                <p id="text">First Tab content to be displayed here</p>
        </section>
        <section id="cookieContainer" class="cookieBoxClose cookieBox">
            <img src="cookie.png" alt="cookie">
            <button id="closeButton"></button>
            <p>We use cookies to improve your user experience</p>
            <button id="cookieButton">I like cookies</button>   
        </section>
    </body>
</html>
