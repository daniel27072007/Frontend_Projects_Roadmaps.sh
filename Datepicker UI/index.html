<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Datepicker UI</title>
        <link rel="icon" href="favicon.png">
        <link rel="stylesheet" href="stylesheet.css">
    </head>
    <body>
        <section class="settings">
            <section class="header">
                <div id="date">
                    <p id="dayToday">27</p>
                    <span>/</span>
                    <p id="monthToday">07</p>
                    <span>/</span>
                    <p id="yearToday">2007</p>
                </div>
                <img src="favicon.png" alt="calendar icon">
            </section>
            <section class="calendar">
                <section id="topInfo">
                    <div id="calendarSearch">
                        <p id="month">July</p>
                        <p id="year">2026</p>
                    </div>
                    <div id="weekNames">
                        <p>S</p><p>M</p><p>T</p><p>W</p><p>T</p><p>F</p><p>S</p>
                    </div>
                </section>
                <section id="bottomInfo">
                    <div id="daysRow">
                        <p id="none"></p><p id="none"></p><p id="none"></p><p id="none"></p><p>1</p><p>2</p><p>3</p>
                    </div>
                    <div id="daysRow">
                        <p>4</p><p>5</p><p>6</p><p>7</p><p>8</p><p>9</p><p>10</p>
                    </div>
                    <div id="daysRow">
                        <p>11</p><p>12</p><p>13</p><p>14</p><p>15</p><p>16</p><p>17</p>
                    </div>
                    <div id="daysRow">
                        <p>18</p><p>19</p><p>20</p><p>21</p><p>22</p><p>23</p><p>24</p>
                    </div>
                    <div id="daysRow">
                        <p>25</p><p>26</p><p>27</p><p>28</p><p>29</p><p>30</p><p>31</p>
                    </div>                  
                </section>
            </section>
        </section>
    </body>
</html>
