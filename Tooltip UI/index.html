<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolTip UI</title>
    <link rel="icon" href="favicon.jpg">
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
<div class="elements">
  
  <!-- Primeiro Grupo: Home -->
  <div class="item-menu">
    <div class="tooltip">Click Here to see the Home Page</div>
    <p class="text-dot">Home</p>
  </div>

  <!-- Segundo Grupo: Projects -->
  <div class="item-menu">
    <div class="tooltip">Click Here to see My Projects</div>
    <p class="text-dot">Projects</p>
  </div>

  <!-- Terceiro Grupo: Blog -->
  <div class="item-menu">
    <div class="tooltip">Click Here to see my Blog</div>
    <p>Blog</p>
  </div>

</div>


</body>
</html>
